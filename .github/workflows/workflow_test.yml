name: Creación imaxe docker #

on:
  #
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  #
  build:
    runs-on: ubuntu-latest #
    steps:
      #
      - name: Checkout repository #
        uses: actions/checkout@v6 #

      - name: Use Node.js
        uses: actions/setup-node@v6 #
        with:
          node-version: 24

      - name: Run npm #
        run: npm ci

      - name: Run tests
        run: npm test

  build-and-push:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Checkout
        uses: actions/checkout@v6

      # Permite crear imaxes para diferentes arquitecturas
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      # Para builds avanzados
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

        # Definir as plataformas do build (amd e arm)
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/practicagithubactions:latest
